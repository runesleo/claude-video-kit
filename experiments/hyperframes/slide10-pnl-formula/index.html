<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0a;
      }

      .scene-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 48px 80px;
        gap: 28px;
      }

      .slide-title {
        font-family: "JetBrains Mono", "Fira Code", "SF Mono", monospace;
        font-size: 48px;
        font-weight: 700;
        color: #fbbf24;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .pnl-eq {
        font-family: "JetBrains Mono", "Fira Code", "SF Mono", monospace;
        font-size: 56px;
        font-weight: 700;
        color: #f8f8f2;
        letter-spacing: -0.01em;
      }

      .formula-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
      }

      .formula-row {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: nowrap;
        justify-content: center;
      }

      .op {
        font-family: "JetBrains Mono", "Fira Code", "SF Mono", monospace;
        font-size: 48px;
        font-weight: 700;
        color: #94a3b8;
      }

      .bracket-group {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 24px;
        border-radius: 14px;
        flex-wrap: nowrap;
      }

      .bracket-group.income {
        background: rgba(16, 185, 129, 0.12);
        border: 2px solid rgba(16, 185, 129, 0.3);
      }

      .bracket-group.expense {
        background: rgba(239, 68, 68, 0.12);
        border: 2px solid rgba(239, 68, 68, 0.3);
      }

      .bracket-group.unrealized {
        background: rgba(251, 191, 36, 0.08);
        border: 2px solid rgba(251, 191, 36, 0.25);
      }

      .term {
        font-family: "JetBrains Mono", "Fira Code", "SF Mono", monospace;
        font-size: 36px;
        font-weight: 600;
        opacity: 0.3;
        transition: opacity 0.3s;
        white-space: nowrap;
      }

      .term.income { color: #10b981; }
      .term.expense { color: #ef4444; }
      .term.unrealized { color: #fbbf24; }

      .term.active { opacity: 1; }
      .term.done { opacity: 0.75; }

      .sep {
        font-family: "JetBrains Mono", "Fira Code", "SF Mono", monospace;
        font-size: 32px;
        color: #475569;
      }

      .label-row {
        display: flex;
        gap: 56px;
        justify-content: center;
      }

      .label-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: "JetBrains Mono", "Fira Code", "SF Mono", monospace;
        font-size: 28px;
        color: #94a3b8;
      }

      .label-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
      }

      .label-dot.income { background: #10b981; }
      .label-dot.expense { background: #ef4444; }
      .label-dot.unrealized { background: #fbbf24; }

      .tagline {
        font-family: "JetBrains Mono", "Fira Code", "SF Mono", monospace;
        font-size: 36px;
        color: #64748b;
        text-align: center;
        line-height: 1.5;
      }

      .highlight-bar {
        position: absolute;
        top: 0;
        left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(251,191,36,0.15), transparent);
        pointer-events: none;
      }

      #formula-wrapper {
        position: relative;
        width: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="slide10-pnl"
      data-start="0"
      data-duration="20"
      data-width="1920"
      data-height="1080"
    >
      <!-- Main scene clip -->
      <div id="scene-main" class="clip" data-start="0" data-duration="20" data-track-index="0">
        <div class="scene-content">

          <!-- Title -->
          <div id="slide-title" class="slide-title">完整公式</div>

          <!-- PnL = -->
          <div id="pnl-eq" class="pnl-eq">PnL =</div>

          <!-- Formula block -->
          <div id="formula-wrapper">
            <div class="formula-block">
              <!-- Income row -->
              <div class="formula-row">
                <div class="bracket-group income">
                  <span id="t-sell"   class="term income">SELL</span>
                  <span class="sep">+</span>
                  <span id="t-redeem" class="term income">REDEEM</span>
                  <span class="sep">+</span>
                  <span id="t-merge"  class="term income">MERGE</span>
                  <span class="sep">+</span>
                  <span id="t-rebate" class="term income">REBATE</span>
                </div>
              </div>

              <!-- Minus + expense row + Plus unrealized (same row for horizontal layout) -->
              <div class="formula-row">
                <span id="op-minus" class="op" style="opacity:0">−</span>
                <div class="bracket-group expense">
                  <span id="t-buy"   class="term expense">BUY</span>
                  <span class="sep">+</span>
                  <span id="t-split" class="term expense">SPLIT</span>
                </div>
                <span id="op-plus" class="op" style="opacity:0">+</span>
                <div class="bracket-group unrealized">
                  <span id="t-sigma" class="term unrealized">Σ(size × price)</span>
                </div>
                <div id="unrealized-label" style="opacity:0; font-family: 'JetBrains Mono', monospace; font-size:28px; color:#fbbf24;">← 未实现</div>
              </div>
            </div>

            <!-- Highlight sweep bar -->
            <div id="highlight-bar" class="highlight-bar"></div>
          </div>

          <!-- Legend labels -->
          <div id="labels" class="label-row" style="opacity:0">
            <div class="label-item">
              <div class="label-dot income"></div>
              <span>入金</span>
            </div>
            <div class="label-item">
              <div class="label-dot expense"></div>
              <span>出金</span>
            </div>
            <div class="label-item">
              <div class="label-dot unrealized"></div>
              <span>未实现</span>
            </div>
          </div>

          <!-- Tagline -->
          <div id="tagline" class="tagline" style="opacity:0">这就是你真正的盈亏</div>

        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // --- 0-1s: Title fade in from top ---
      tl.from("#slide-title", { y: -40, opacity: 0, duration: 0.8, ease: "expo.out" }, 0.2);

      // --- 1-3s: PnL = appears ---
      tl.from("#pnl-eq", { x: -40, opacity: 0, duration: 0.6, ease: "power3.out" }, 1.2);

      // --- 3-9.5s: Income terms reveal one by one (4 terms, ~1.6s each) ---
      const incomeTerms = ["#t-sell","#t-redeem","#t-merge","#t-rebate"];
      tl.from(".bracket-group.income", { y: 24, opacity: 0, duration: 0.5, ease: "power2.out" }, 2.8);

      incomeTerms.forEach((id, i) => {
        const t = 3.2 + i * 1.6;
        tl.to(id, { opacity: 1, color: "#10b981", duration: 0.35, ease: "power2.out" }, t);
        tl.to(id, { opacity: 0.75, duration: 0.3, ease: "power1.in" }, t + 0.9);
      });

      // --- 9.5-11s: Minus + expense group ---
      tl.to("#op-minus", { opacity: 1, duration: 0.4, ease: "power2.out" }, 9.5);
      tl.from(".bracket-group.expense", { y: 24, opacity: 0, duration: 0.5, ease: "power2.out" }, 9.8);
      tl.to("#t-buy",   { opacity: 1, duration: 0.3, ease: "power2.out" }, 10.1);
      tl.to("#t-buy",   { opacity: 0.75, duration: 0.2 }, 10.55);
      tl.to("#t-split", { opacity: 1, duration: 0.3, ease: "power2.out" }, 10.7);
      tl.to("#t-split", { opacity: 0.75, duration: 0.2 }, 11.15);

      // --- 11.8-13.3s: Plus unrealized ---
      tl.to("#op-plus", { opacity: 1, duration: 0.4, ease: "power2.out" }, 11.8);
      tl.from(".bracket-group.unrealized", { y: 24, opacity: 0, duration: 0.5, ease: "expo.out" }, 12.0);
      tl.to("#t-sigma", { opacity: 1, duration: 0.4, ease: "power2.out" }, 12.4);
      tl.to("#unrealized-label", { opacity: 1, x: 0, duration: 0.4, ease: "power2.out" }, 12.9);

      // --- Legend ---
      tl.to("#labels", { opacity: 1, duration: 0.5, ease: "power2.out" }, 13.8);

      // --- 15-17.5s: Highlight sweep left-to-right across formula ---
      tl.to("#highlight-bar", {
        left: "140%",
        duration: 2.5,
        ease: "power1.inOut"
      }, 15.0);

      // --- Tagline ---
      tl.to("#tagline", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 16.5);
      tl.from("#tagline", { y: 16, duration: 0.6, ease: "power3.out" }, 16.5);

      // --- 19-20s: hold ---

      window.__timelines["slide10-pnl"] = tl;
    </script>
  </body>
</html>

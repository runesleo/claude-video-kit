name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  remotion-tsc:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: remotion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
